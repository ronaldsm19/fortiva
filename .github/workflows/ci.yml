name: CI

# Corre en cada push y PR hacia main para detectar errores de tipos/build
# antes de desplegar en Vercel.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # URL dummy: typecheck/build no conectan a la BD, pero Prisma exige la
      # variable para generar el cliente y resolver el datasource.
      DATABASE_URL: "mongodb://localhost:27017/ci"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run typecheck
      - run: npm run build

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
